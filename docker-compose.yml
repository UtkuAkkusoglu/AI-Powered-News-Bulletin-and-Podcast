version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: news-and-podcast-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - news_and_podcast_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  news_and_podcast_postgres_data: