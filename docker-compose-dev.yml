version: '3.8'

services:
  # 1. Veritabanı Servisimiz
  db:
    image: postgres:18-alpine
    container_name: news-and-podcast-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - news_and_podcast_postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Çift dolar işareti, değişkenin Compose tarafından değil, 
      # konteyner içindeki shell tarafından okunmasını sağlar.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis (Celery Mesaj Taşıyıcı)
  redis:
    image: redis:alpine
    container_name: news-and-podcast-redis
    ports:
      - "6379:6379"

  # 3. FastAPI Uygulaması
  api:
    build: .
    container_name: news-and-podcast-api
    restart: always
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # 4. Celery Worker (AI işlerini yapacak motor)
  worker:
    build: .
    container_name: news-and-podcast-worker
    command: celery -A worker.celery_app worker --loglevel=info
    env_file: 
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  news_and_podcast_postgres_data: